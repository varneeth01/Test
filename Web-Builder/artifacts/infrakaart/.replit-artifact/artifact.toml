kind = "web"
previewPath = "/"
title = "Infrakaart"
version = "1.0.0"
id = "artifacts/infrakaart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23241

[services.development]
run = "pnpm --filter @workspace/infrakaart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/infrakaart", "run", "build" ]
publicDir = "artifacts/infrakaart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23241"
BASE_PATH = "/"
